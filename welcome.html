  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Fredoka+One&family=Lexend:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
      background:#000;
      position:relative;
      font-family: 'Lexend', sans-serif;
      /* Extra security: No text highlighting */
      user-select: none;
      -webkit-user-select: none;
    }

    /* Luxury Background */
    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:url('bg.PNG') center/cover no-repeat;
      filter:brightness(0.25) saturate(1.3);
      z-index:-2;
    }

    /* Gold Royal Overlay */
    body::after{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at top, rgba(255,215,0,0.15), transparent 60%),
                 linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.4));
      z-index:-1;
    }

    .container{
      width:90%;
      max-width:750px;
      padding:45px 30px;
      border-radius:28px;
      backdrop-filter: blur(10px);
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,215,0,0.25);
      box-shadow:0 0 40px rgba(255,215,0,0.15);
      animation:fadeIn 1.5s ease;
    }

    h1{
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size:44px;
      color:#ffd36b;
      text-shadow:0 0 15px rgba(255,211,107,0.4);
      margin-bottom:15px;
    }

    .typing{
      font-family: 'Lexend', sans-serif;
      font-size:18px;
      font-weight: 300;
      line-height:1.9;
      color:#f5f5f5;
      margin-bottom:30px;
    }

    .buttons{
      display:flex;
      flex-wrap:wrap;
      gap:15px;
      justify-content:center;
    }

    .btn{
      font-family: 'Fredoka One', cursive;
      padding:14px 22px;
      border-radius:50px;
      text-decoration:none;
      font-weight:400;
      font-size:16px;
      transition:0.3s;
      border:none;
      cursor:pointer;
      display:inline-block;
      letter-spacing: 0.5px;
    }

    .btn-gold{
      background:linear-gradient(45deg,#ffd36b,#ff9f1c);
      color:#000;
      box-shadow:0 0 20px rgba(255,211,107,0.4);
    }

    .btn-gold:hover{
      transform:scale(1.08);
    }

    .btn-sad{
      background:rgba(255,255,255,0.9);
      color:#b30059;
    }

    .btn-sad:hover{
      transform:scale(1.08);
      background:#ffe3ef;
    }

    .btn-music{
      background:#111;
      color:#ffd36b;
      border:1px solid #ffd36b;
    }

    .btn-music:hover{
      transform:scale(1.08);
      background:#1a1a1a;
    }

    /* نیا بنائی گئی خصوصی تھیم والا بٹن */
    .btn-hubby {
      background: linear-gradient(45deg, #ff4d88, #ec4899);
      color: #fff;
      box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
    }

    .btn-hubby:hover {
      transform: scale(1.08);
      box-shadow: 0 0 25px rgba(236, 72, 153, 0.7);
    }

    .heart{
      position:absolute;
      color:#ff4d88;
      animation:floatUp 6s linear infinite;
      opacity:0.7;
      pointer-events:none;
    }

    @keyframes floatUp{
      0%{transform:translateY(100vh) scale(0);}
      100%{transform:translateY(-10vh) scale(1.5);}
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(30px);}
      to{opacity:1; transform:translateY(0);}
    }

    .touch-heart{
      position:absolute;
      color:#ff4d88;
      font-size:18px;
      animation:pop 1s ease-out forwards;
      pointer-events:none;
    }

    @keyframes pop{
      0%{transform:scale(0); opacity:1;}
      100%{transform:scale(2.5) translateY(-50px); opacity:0;}
    }

    @media(max-width:600px){
      h1{font-size:32px;}
      .typing{font-size:16px;}
      .btn{width:100%;}
    }
  </style>
</head>

<script>
  // Security: Block Keys
  document.onkeydown = function(e) {
      if(event.keyCode == 123) return false; 
      if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; 
      if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
  }

  // Touch / click heart bubbles effect
  document.addEventListener("click", function(e){
    createHeart(e.pageX, e.pageY);
  });

  document.addEventListener("touchstart", function(e){
    let touch = e.touches[0];
    createHeart(touch.pageX, touch.pageY);
  });

  function createHeart(x, y){
    const heart = document.createElement("div");
    heart.className = "touch-heart";
    heart.innerHTML = "❤";
    heart.style.left = x + "px";
    heart.style.top = y + "px";
    document.body.appendChild(heart);
    setTimeout(()=> heart.remove(), 1000);
  }
</script>
