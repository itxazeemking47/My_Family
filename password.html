<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Memories | Access Denied</title>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Lexend', sans-serif; overflow: hidden; }

        /* Password Overlay */
        #password-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, #1a1a1a, #000);
            z-index: 10000; display: flex; justify-content: center; align-items: center;
            flex-direction: column; text-align: center; transition: 0.8s ease;
        }

        .auth-box {
            padding: 40px; border-radius: 30px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 211, 105, 0.3); backdrop-filter: blur(15px);
            width: 90%; max-width: 350px;
        }

        h2 { color: #ffd369; margin-bottom: 25px; font-size: 1.8rem; font-family: 'Playfair Display', serif; }

        input {
            width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #ffd369;
            background: transparent; color: white; outline: none; text-align: center; font-size: 16px;
            box-sizing: border-box; transition: 0.3s;
        }

        button {
            margin-top: 25px; width: 100%; padding: 15px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, #ffd369, #ff9f1c); color: #000;
            font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.4s;
        }

        button:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 211, 105, 0.4); }

        #error-msg { color: #ff4d4d; margin-top: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Password Screen -->
    <div id="password-screen">
        <div class="auth-box">
            <h2>✨ Private Memories ✨</h2>
            <p style="color:#ccc; margin-bottom: 20px;">Sirf authorized access allowed hai...</p>
            <input type="password" id="pass-input" placeholder="Enter Password..." autocomplete="off">
            <button onclick="checkPassword()">Unlock Access</button>
            <p id="error-msg">Ghalat Password! Phir se try karein.</p>
        </div>
    </div>

    <!-- Main Content (Hidden until password) -->
    <div id="main-content" style="display:none;">
        <h1 style="color:white; text-align:center; padding-top:50px;">Welcome to the Memories!</h1>
        <!-- Yahan aapka baki content aayega -->
    </div>

    <script>
        // Disable Right Click & Keys
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0))) return false;
        }

        function checkPassword() {
            const pass = document.getElementById('pass-input').value;
            // Case-Sensitive Password (yahan apna password likhein)
            const correctPass = "Ambar"; 

            if(pass === correctPass) {
                // Sahi hone par home.html par bhej dein
                window.location.href = "home.html";
            } else {
                const error = document.getElementById('error-msg');
                error.style.display = "block";
                document.getElementById('pass-input').style.border = "1px solid #ff4d4d";
                document.getElementById('pass-input').value = ""; // Clear input
            }
        }

        document.getElementById('pass-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
