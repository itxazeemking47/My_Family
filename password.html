<!-- 1. Password Overlay (Add this right after <body>) -->
<div id="password-screen" style="position:fixed; inset:0; background:#050505; z-index:10000; display:flex; justify-content:center; align-items:center; flex-direction:column; text-align:center; transition: 0.5s;">
    <h2 style="color:#ffd369; margin-bottom:20px; font-size:1.5rem;">✨ Private Memories ✨</h2>
    <input type="password" id="pass-input" placeholder="hamari baeti ka name kiya he..." style="padding:12px 20px; border-radius:25px; border:1px solid #ffd369; background:transparent; color:white; outline:none; text-align:center; width:250px;">
    <button onclick="checkPassword()" style="margin-top:20px; padding:10px 30px; border-radius:25px; border:none; background:#ffd369; color:black; font-weight:bold; cursor:pointer; transition:0.3s;">Unlock</button>
    <p id="error-msg" style="color:#ff4d4d; margin-top:15px; font-size:14px; display:none;">Ghalat Password! Dobara koshish karen.</p>
</div>

<!-- 2. Wrap your entire existing content in this div -->
<div id="main-content" style="display:none;">
    <!-- Aapka pura purana code yahan se shuru hoga (Hero, Story, Footer) -->
    <div class="bg-fixed"></div>
    <section class="hero"> ... </section>
    <div class="story-container"> ... </div>
    <footer class="footer"> ... </footer>
</div>

<!-- 3. Add this Script at the end -->
<script>
function checkPassword() {
    const pass = document.getElementById('pass-input').value;
    const correctPass = "Ambar"; // Aap yahan apna password set karen

    if(pass === correctPass) {
        document.getElementById('password-screen').style.opacity = "0";
        setTimeout(() => {
            document.getElementById('password-screen').style.display = "none";
            document.getElementById('main-content').style.display = "block";
            // Reveal animation ko restart karne ke liye
            document.querySelectorAll('.story-block').forEach(block => observer.observe(block));
        }, 500);
    } else {
        document.getElementById('error-msg').style.display = "block";
        document.getElementById('pass-input').style.border = "1px solid #ff4d4d";
    }
}

// Enter key se bhi unlock ho jaye
document.getElementById('pass-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        checkPassword();
    }
});
</script>
