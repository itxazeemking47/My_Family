<style>

/* =========================
   ROMANTIC CINEMATIC FONTS UPGRADE
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#050505;
    color:white;
    overflow-x:hidden;

    /* DEFAULT FONT */
    font-family:'Poppins', sans-serif;
    scroll-behavior:smooth;
}

/* ===== BACKGROUND ===== */

.bg-fixed{
    position:fixed;
    inset:0;
    z-index:-3;

    background:
    radial-gradient(circle at 20% 20%, rgba(255,105,180,0.10), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,211,105,0.08), transparent 45%),
    radial-gradient(circle at 50% 80%, rgba(120,180,255,0.07), transparent 50%),
    linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95));

    animation:bgPulse 18s ease-in-out infinite alternate;
}

@keyframes bgPulse{
    from{ transform:scale(1); }
    to{ transform:scale(1.08); }
}

/* ===== CURSOR GLOW ===== */

.cursor-glow{
    position:fixed;
    width:20px;
    height:20px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,105,180,0.8), transparent 70%);
    pointer-events:none;
    z-index:9999;
    transform:translate(-50%,-50%);
}

/* ===== HERO SECTION ===== */

.intro-section{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero-box{
    max-width:850px;
}

/* badge */
.top-badge{
    font-family:'Poppins', sans-serif;
    font-size:14px;
    letter-spacing:2px;

    padding:12px 25px;
    border-radius:50px;

    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);

    display:inline-block;
}

/* ===== MAIN TITLE (ROMANTIC LUXURY FONT) ===== */

.gold-title{
    font-family:'Playfair Display', serif;

    font-size:clamp(3rem,6vw,5.5rem);
    font-weight:700;

    color:#ffd369;

    text-shadow:
    0 0 25px rgba(255,211,105,0.4),
    0 0 60px rgba(255,105,180,0.15);

    margin-top:25px;
}

/* ===== POETRY TEXT ===== */

.sub-poetry,
.quote-poetry,
.ending-text{

    font-family:'Poppins', sans-serif;

    color:rgba(255,255,255,0.85);
}

/* intro poetry */
.sub-poetry{
    margin-top:20px;
    font-size:1.6rem;
    line-height:2.2;
}

/* story poetry */
.quote-poetry{
    margin-top:30px;
    font-size:1.7rem;
    line-height:2.3;
}

/* ===== LOVE NAME FONT (HANDWRITING STYLE) ===== */

.ending-name,
.footer-name{
    font-family:'Dancing Script', cursive;

    color:#ffd369;
    text-shadow:0 0 40px rgba(255,211,105,0.4);
}

/* sizes */
.ending-name{ font-size:3.5rem; }
.footer-name{ font-size:3.8rem; }

/* ===== BUTTONS ===== */

.scroll-btn,
.next-btn{
    font-family:'Poppins', sans-serif;

    text-decoration:none;
    font-weight:600;

    border-radius:50px;
    transition:0.4s;
}

/* hero button */
.scroll-btn{
    display:inline-block;
    margin-top:40px;

    padding:16px 40px;

    background:linear-gradient(135deg,#ff4d88,#ff7eb3,#ffd369);
    color:black;

    box-shadow:0 10px 35px rgba(255,77,136,0.35);
}

/* next button */
.next-btn{
    display:inline-block;
    padding:18px 45px;

    background:linear-gradient(135deg,#ffd369,#ff7eb3);
    color:black;

    box-shadow:0 20px 50px rgba(255,211,105,0.25);
}

/* hover */
.scroll-btn:hover,
.next-btn:hover{
    transform:scale(1.08);
}

/* ===== IMAGE CARDS ===== */

.picture-card{
    border-radius:30px;
    overflow:hidden;

    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.10);

    backdrop-filter:blur(14px);

    padding:14px;

    box-shadow:0 25px 70px rgba(0,0,0,0.75);

    transition:0.5s;
}

.picture-card:hover{
    transform:translateY(-10px) scale(1.02);
}

/* image */
.picture-card img{
    width:100%;
    border-radius:22px;
    display:block;
}

/* ===== ANIMATION ===== */

.story-block{
    opacity:0;
    transform:translateY(80px);
    transition:1.2s ease;
}

.story-block.active{
    opacity:1;
    transform:translateY(0);
}

@keyframes bgPulse{
    from{filter:brightness(1);}
    to{filter:brightness(1.15);}
}

/* ===== MOBILE ===== */

@media(max-width:768px){
    .sub-poetry{font-size:1.4rem;}
    .quote-poetry{font-size:1.5rem;}
    .ending-name{font-size:2.8rem;}
    .footer-name{font-size:3rem;}
}

                        </style>
