<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Cinematic Experience</title>
    
    <!-- IMPORTANT: Google Fonts Link (Missing in your code) -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        /* =========================
           ROMANTIC CINEMATIC FONTS UPGRADE
        ========================= */

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#050505;
            color:white;
            overflow-x:hidden;
            font-family:'Poppins', sans-serif;
            scroll-behavior:smooth;
        }

        /* ===== BACKGROUND ===== */
        .bg-fixed{
            position:fixed;
            inset:0;
            z-index:-3;
            background:
                radial-gradient(circle at 20% 20%, rgba(255,105,180,0.10), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(255,211,105,0.08), transparent 45%),
                radial-gradient(circle at 50% 80%, rgba(120,180,255,0.07), transparent 50%),
                linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95));
            /* Combined animation into one */
            animation: bgPulse 18s ease-in-out infinite alternate;
        }

        @keyframes bgPulse{
            from{ transform:scale(1); filter: brightness(1); }
            to{ transform:scale(1.08); filter: brightness(1.15); }
        }

        /* ===== CURSOR GLOW ===== */
        .cursor-glow{
            position:fixed;
            width:20px;
            height:20px;
            border-radius:50%;
            background:radial-gradient(circle, rgba(255,105,180,0.8), transparent 70%);
            pointer-events:none;
            z-index:9999;
            transform:translate(-50%,-50%);
        }

        /* ===== HERO SECTION ===== */
        .intro-section{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:20px;
        }

        .hero-box{ max-width:850px; }

        .top-badge{
            font-size:14px;
            letter-spacing:2px;
            padding:12px 25px;
            border-radius:50px;
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.12);
            display:inline-block;
            text-transform: uppercase;
        }

        .gold-title{
            font-family:'Playfair Display', serif;
            font-size:clamp(3rem,6vw,5.5rem);
            font-weight:700;
            color:#ffd369;
            text-shadow: 0 0 25px rgba(255,211,105,0.4), 0 0 60px rgba(255,105,180,0.15);
            margin-top:25px;
        }

        .sub-poetry{
            margin-top:20px;
            font-size:1.6rem;
            line-height:2.2;
            color:rgba(255,255,255,0.85);
        }

        .ending-name{ 
            font-family:'Dancing Script', cursive;
            color:#ffd369;
            text-shadow:0 0 40px rgba(255,211,105,0.4);
            font-size:3.5rem; 
            margin-top: 20px;
            display: block;
        }

        .scroll-btn{
            display:inline-block;
            margin-top:40px;
            padding:16px 40px;
            background:linear-gradient(135deg,#ff4d88,#ff7eb3,#ffd369);
            color:black;
            text-decoration:none;
            font-weight:600;
            border-radius:50px;
            transition:0.4s;
            box-shadow:0 10px 35px rgba(255,77,136,0.35);
        }

        .scroll-btn:hover{ transform:scale(1.08); }

        /* Animation class logic */
        .story-block{
            opacity:1; /* Temporarily set to 1 so you can see it without JS */
            transform:translateY(0);
            transition:1.2s ease;
            padding: 50px 20px;
            text-align: center;
        }

        @media(max-width:768px){
            .sub-poetry{font-size:1.2rem;}
            .ending-name{font-size:2.8rem;}
        }
    </style>
</head>
<body>

    <div class="bg-fixed"></div>
    <div class="cursor-glow" id="cursor"></div>

    <section class="intro-section">
        <div class="hero-box story-block">
            <div class="top-badge">A Tale of Love</div>
            <h1 class="gold-title">Timeless Romance</h1>
            <p class="sub-poetry">
                In the dance of stars and the whisper of the wind,<br>
                I found a soul that matches mine.
            </p>
            <span class="ending-name">Forever Yours</span>
            <a href="#" class="scroll-btn">Enter Our World</a>
        </div>
    </section>

    <script>
        // Cursor Glow Follow Logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
