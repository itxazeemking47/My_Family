<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | My Sweet Family</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('bg.jpg');
            background-size: cover; background-position: center;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); padding: 40px;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            text-align: center; width: 300px;
        }
        h2 { color: #D4AF37; margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px; margin-bottom: 20px;
            border-radius: 10px; border: none; outline: none;
            background: rgba(255,255,255,0.9); text-align: center; font-size: 16px;
        }
        button {
            background: #D4AF37; color: black; border: none;
            padding: 12px 30px; border-radius: 10px; cursor: pointer;
            font-weight: bold; width: 100%; transition: 0.3s;
        }
        button:hover { background: #b8962d; transform: scale(1.05); }
        .error { color: #ff4d4d; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>My Love Portal 🥰</h2>
        <p style="margin-bottom: 20px;">Speacialy for my wifey 👰💍</p>
        <input type="password" id="passwordInput" placeholder="Name of our daughter">
        <button onclick="checkPassword()">Enter 🔑</button>
        <p id="errorMsg" class="error">Who are you stranger 😠</p>
    </div>

    <script>
        function checkPassword() {
            const pass = document.getElementById('passwordInput').value;
            // Aapka password: ambar
            if (pass.toLowerCase() === 'Ambar') {
                window.location.href = 'home.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
        // Enter key se bhi login ho jaye
        document.getElementById('passwordInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { checkPassword(); }
        });
    </script>
</body>
</html>
