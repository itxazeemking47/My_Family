<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Love Portal  |  Only for my Pagal Larkiiii😘</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Great+Vibes&family=Quicksand:wght@400;600&family=Fredoka+One&family=Lexend:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            font-family: 'Quicksand', sans-serif;
            position:relative;
            background:black;
            transition: opacity 0.7s;
        }

        /* Background Image - Added back bg.PNG */
        body::before{
            content:"";
            position:absolute;
            inset:0;
            background:
            linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.78)),
            url('bg.PNG'); /* Aapka wallpaper wapis add kar diya */
            background-size:cover;
            background-position:center;
            filter:blur(1px);
            transform:scale(1.05);
            z-index:-2;
        }

        /* Glow Effect */
        body::after{
            content:"";
            position:absolute;
            inset:0;
            background:radial-gradient(circle at top, rgba(255,192,203,0.18), transparent 40%);
            z-index:-1;
        }

        .login-box{
            width:360px;
            padding:45px 35px;
            border-radius:28px;
            text-align:center;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.12);
            backdrop-filter:blur(14px);
            -webkit-backdrop-filter:blur(14px);
            box-shadow:
            0 10px 40px rgba(0,0,0,0.45),
            0 0 30px rgba(255,182,193,0.12);
            animation:fadeUp 1.2s ease;
            position: relative;
            z-index: 10;
        }

        .top-heart{
            font-size:55px;
            margin-bottom:10px;
            animation:pulse 2s infinite;
        }

        h1{
            font-family: 'Playfair Display', serif;
            font-size: 38px;
            font-weight:700;
            font-style: italic;
            color:#ffffff;
            margin-bottom:8px;
            letter-spacing:1px;
        }

        .gold{
            color:#ffd369;
            text-shadow: 0 0 10px rgba(255,211,105,0.3);
        }

        .subtitle{
            font-family: 'Lexend', sans-serif;
            color:#f3f3f3;
            font-size:15px;
            font-weight: 300;
            line-height:1.5;
            margin-bottom:28px;
            opacity:0.95;
        }

        .input-box{
            position:relative;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:16px 18px;
            border:none;
            outline:none;
            border-radius:16px;
            font-family: 'Lexend', sans-serif;
            font-size:15px;
            text-align:center;
            background:rgba(255,255,255,0.92);
            color:#222;
            transition:0.3s;
        }

        input:focus{
            transform:scale(1.02);
            box-shadow:0 0 18px rgba(255,255,255,0.25);
        }

        button{
            width:100%;
            border:none;
            outline:none;
            padding:15px;
            border-radius:16px;
            font-family: 'Fredoka One', cursive;
            font-size:16px;
            font-weight:400;
            cursor:pointer;
            color:white;
            background:linear-gradient(135deg, #ff4d88, #ff7eb3);
            transition:0.35s;
            box-shadow:0 10px 25px rgba(255,77,136,0.35);
        }

        button:hover{
            transform:translateY(-2px) scale(1.03);
            box-shadow:0 15px 30px rgba(255,77,136,0.5);
        }

        .bottom-text{
            font-family: 'Lexend', sans-serif;
            margin-top:22px;
            font-size:13px;
            color:#eee;
            opacity:0.85;
            line-height:1.6;
        }

        .error{
            font-family: 'Lexend', sans-serif;
            color:#ff8c8c;
            font-size:14px;
            margin-top:15px;
            display:none;
            animation:shake 0.3s linear;
        }

        .falling-heart {
            position: absolute;
            top: -10%;
            z-index: 1;
            user-select: none;
            animation: moveHearts 5s linear infinite;
        }

        @keyframes moveHearts {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .loader-wrapper {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            text-align: center;
        }

        .congrats-heart {
            font-size: 85px;
            animation: bigPulse 0.6s infinite alternate;
        }

        .congrats-text {
            font-family: 'Fredoka One', cursive;
            color: #ffd369;
            font-size: 32px;
            margin-top: 25px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .loading-sub {
            font-family: 'Lexend', sans-serif;
            color: #ffb6c1;
            font-size: 18px;
            margin-top: 10px;
            font-weight: 400;
        }

        @keyframes fadeUp{
            from{ opacity:0; transform:translateY(30px); }
            to{ opacity:1; transform:translateY(0); }
        }

        @keyframes pulse{
            0%, 100%{ transform:scale(1); }
            50%{ transform:scale(1.08); }
        }

        @keyframes bigPulse {
            from { transform: scale(1); }
            to { transform: scale(1.3); }
        }

        @keyframes shake{
            0%, 100%{ transform:translateX(0); }
            25%, 75%{ transform:translateX(-4px); }
            50%{ transform:translateX(4px); }
        }

        @media(max-width:450px){
            .login-box{ width:90%; padding:40px 25px; }
            h1{ font-size:30px; }
        }
    </style>
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loader" class="loader-wrapper">
        <div class="loader-content">
            <div class="congrats-heart">💖</div>
            <h2 class="congrats-text">CONGRATULATIONS PRINCESS!</h2>
            <p class="loading-sub">Wait a second... My Love is Loading ❤️</p>
        </div>
    </div>

    <div class="login-box">
        <div class="top-heart">💝</div>

        <h1>For my <span class="gold">Pagal</span></h1>

        <p class="subtitle">
            oh meri jaan ke tote,<br>
            pareshan na huwa karo ✨<br> Main hu na
        </p>

        <div class="input-box">
            <input 
                type="password" 
                id="passwordInput" 
                placeholder="Hmari baeti ka name kiya he...?"
            >
        </div>

        <button onclick="checkPassword()">
            Unlock Our Love 🔐
        </button>

        <p id="errorMsg" class="error">
            kon ho tum stranger😡
        </p>

        <div class="bottom-text">
            muje pata he acha nahi bana ❤️<br>
            par dill se bnaya he.
        </div>
    </div>

    <script>
        function createHearts() {
            const container = document.body;
            const hearts = ['❤️', '💖', '💝', '💗', '💕', '💜', '💙', '💛'];
            const heart = document.createElement('div');
            
            heart.classList.add('falling-heart');
            heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
            
            container.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        setInterval(createHearts, 300);

        function checkPassword() {
            const pass = document.getElementById('passwordInput').value.trim();
            const loader = document.getElementById('loader');
            const loginBox = document.querySelector('.login-box');

            if(pass.toLowerCase() === 'ambar'){
                loginBox.style.display = "none";
                loader.style.display = "flex";

                setTimeout(() => {
                    document.body.style.opacity = "0";
                    setTimeout(() => {
                        window.location.href = "welcome.html";
                    }, 700);
                }, 3000);

            } else {
                const error = document.getElementById('errorMsg');
                error.style.display = 'block';
                setTimeout(() => {
                    error.style.display = 'none';
                }, 3000);
            }
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e){
            if(e.key === 'Enter'){
                checkPassword();
            }
        });
    </script>
</body>
</html>
