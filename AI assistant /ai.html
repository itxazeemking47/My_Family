<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot with Live 2D Character</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>

  <style>
    :root {
      --bg-dark: #0a0f1c;
      --bg-panel: #111827;
      --text-primary: #e2e8f0;
      --text-secondary: #94a3b8;
      --accent-purple: #a855f7;
      --accent-cyan: #06b6d4;
      --accent-mint: #10b981;
      --border-radius: 12px;
      --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.25);
      --shadow-inner: inset 0 0 30px rgba(0, 0, 0, 0.35);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg-dark) 0%, #1a202c 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .container {
      width: 100%;
      max-width: 1400px;
      height: 90vh;
      background: var(--bg-dark);
      border-radius: 24px;
      display: flex;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    /* 2D Character Panel */
    .character-panel {
      width: 45%;
      background: var(--bg-panel);
      border-radius: 24px 0 0 24px;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .character-title {
      padding: 20px 24px;
      font-size: 1.2rem;
      font-weight: 600;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text-secondary);
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .character-canvas {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: radial-gradient(circle at center, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
    }

    /* Chat Panel */
    .chat-panel {
      width: 55%;
      background: var(--bg-panel);
      border-radius: 0 24px 24px 0;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-inner);
    }

    .chat-header {
      padding: 16px 24px;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--accent-cyan);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .messages {
      flex: 1;
      padding: 16px 20px 16px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent-purple) 0%, #8b5cf6 100%);
      color: #ffffff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
    }

    .message.ai {
      align-self: flex-start;
      background: var(--bg-dark);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.3);
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 10px 16px;
      background: var(--bg-dark);
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--accent-cyan);
      font-size: 0.9rem;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.7;
      animation: typingDot 1.4s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-3px); }
    }

    .input-area {
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      color: var(--text-primary);
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
    }

    .input-area input:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
    }

    .input-area button {
      padding: 0 18px;
      background: linear-gradient(135deg, var(--accent-purple) 0%, #8b5cf6 100%);
      color: #ffffff;
      border: none;
      border-radius: 24px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .input-area button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
    }

    .send-icon {
      width: 16px;
      height: 16px;
      stroke: #ffffff;
      fill: none;
      stroke-width: 2;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .container {
        flex-direction: column;
        height: 95vh;
      }
      .character-panel {
        width: auto;
        border-radius: 24px 24px 0 0;
      }
      .chat-panel {
        width: auto;
        border-radius: 0 0 24px 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="character-panel">
      <div class="character-title">Your AI Assistant</div>
      <div class="character-canvas">
        
        <dotlottie-player 
          src="https://lottie.host/929a743e-0159-4596-8393-9d75631c6841/nZUkhQX1ad.lottie" 
          background="transparent" 
          speed="1" 
          style="width: 100%; height: 100%; max-width: 420px;" 
          loop 
          autoplay>
        </dotlottie-player>

      </div>
    </div>

    <div class="chat-panel">
      <div class="chat-header">AI Chatbot</div>
      <div id="messages" class="messages">
        <div class="message ai">
          Hello! I am your AI assistant. How can I help you today?
        </div>
      </div>
      <div class="input-area">
        <input
          type="text"
          id="messageInput"
          placeholder="Type your message..."
          autocomplete="off"
        />
        <button id="sendButton">
          Send
          <svg class="send-icon" viewBox="0 0 24 24">
            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");

    const aiResponse =
      "I'm a demo AI assistant. I'm here to help you with questions, ideas, or just to chat. What would you like to talk about?";

    function addMessage(text, isUser) {
      const msgEl = document.createElement("div");
      msgEl.classList.add("message");
      if (isUser) {
        msgEl.classList.add("user");
      } else {
        msgEl.classList.add("ai");
      }
      msgEl.textContent = text;
      messages.appendChild(msgEl);
      messages.scrollTop = messages.scrollHeight;
    }

    function showTypingIndicator() {
      const typing = document.createElement("div");
      typing.classList.add("typing-indicator");
      typing.id = "typing";

      for (let i = 0; i < 3; i++) {
        const dot = document.createElement("div");
        dot.classList.add("typing-dot");
        typing.appendChild(dot);
      }

      messages.appendChild(typing);
      messages.scrollTop = messages.scrollHeight;
    }

    function hideTypingIndicator() {
      const typing = document.getElementById("typing");
      if (typing) typing.remove();
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      addMessage(text, true);
      messageInput.value = "";

      showTypingIndicator();
      setTimeout(() => {
        hideTypingIndicator();
        addMessage(aiResponse, false);
      }, 1000 + Math.random() * 500);
    }

    sendButton.addEventListener("click", sendMessage);
    messageInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
