<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Love Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:
    linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.35)),
    url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1200&auto=format&fit=crop');
    background-size:cover;
    background-position:center;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:12px;
    overflow:hidden;
}

/* Soft Glow */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left, rgba(255,192,203,0.25), transparent 35%),
    radial-gradient(circle at bottom right, rgba(255,105,180,0.20), transparent 35%);
    pointer-events:none;
}

/* Main Mobile Love Card */
.container{
    width:100%;
    max-width:430px;
    height:95vh;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border-radius:35px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
    position:relative;
    display:flex;
    flex-direction:column;
}

/* Romantic Header */
.top-area{
    padding:20px 20px 10px;
    text-align:center;
    position:relative;
}

.top-area h1{
    color:white;
    font-size:1.6rem;
    font-weight:600;
    margin-bottom:5px;
}

.top-area p{
    color:rgba(255,255,255,0.75);
    font-size:0.9rem;
}

/* AI Character */
.character-box{
    width:100%;
    height:280px;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.character-box::before{
    content:'';
    width:220px;
    height:220px;
    background:radial-gradient(circle, rgba(255,182,193,0.35), transparent 70%);
    position:absolute;
    border-radius:50%;
    animation:pulse 3s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

/* Chat Area */
.chat-panel{
    flex:1;
    background:rgba(255,255,255,0.08);
    border-top:1px solid rgba(255,255,255,0.1);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    backdrop-filter:blur(10px);
}

.messages{
    flex:1;
    overflow-y:auto;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* Messages */
.message{
    max-width:80%;
    padding:12px 16px;
    border-radius:20px;
    font-size:0.92rem;
    line-height:1.5;
    animation:fadeIn 0.3s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.message.ai{
    align-self:flex-start;
    background:rgba(255,255,255,0.12);
    color:white;
    border-bottom-left-radius:6px;
    backdrop-filter:blur(10px);
}

.message.user{
    align-self:flex-end;
    background:linear-gradient(135deg,#ff4f8b,#ff7eb3);
    color:white;
    border-bottom-right-radius:6px;
    box-shadow:0 5px 18px rgba(255,105,180,0.35);
}

/* Typing */
.typing-indicator{
    align-self:flex-start;
    background:rgba(255,255,255,0.12);
    padding:12px 15px;
    border-radius:18px;
    display:flex;
    gap:5px;
}

.typing-dot{
    width:7px;
    height:7px;
    background:white;
    border-radius:50%;
    animation:typing 1.2s infinite;
}

.typing-dot:nth-child(2){
    animation-delay:0.2s;
}

.typing-dot:nth-child(3){
    animation-delay:0.4s;
}

@keyframes typing{
    0%,100%{
        transform:translateY(0);
        opacity:0.5;
    }
    50%{
        transform:translateY(-4px);
        opacity:1;
    }
}

/* Input Area */
.input-area{
    padding:15px;
    display:flex;
    gap:10px;
    background:rgba(0,0,0,0.15);
}

.input-area input{
    flex:1;
    border:none;
    outline:none;
    padding:14px 16px;
    border-radius:30px;
    background:rgba(255,255,255,0.12);
    color:white;
    font-size:0.95rem;
    backdrop-filter:blur(10px);
}

.input-area input::placeholder{
    color:rgba(255,255,255,0.65);
}

.input-area button{
    border:none;
    padding:0 22px;
    border-radius:30px;
    background:linear-gradient(135deg,#ff4f8b,#ff7eb3);
    color:white;
    font-weight:500;
    cursor:pointer;
    transition:0.25s;
}

.input-area button:hover{
    transform:scale(1.05);
}

/* Mobile Optimization */
@media(max-width:480px){

    .container{
        height:100vh;
        max-width:100%;
        border-radius:0;
    }

    .character-box{
        height:240px;
    }

}

</style>
</head>

<body>

<div class="container">

    <!-- Romantic Header -->
    <div class="top-area">
        <h1>❤️ My Love Portal</h1>
        <p>Only for you, my forever person</p>
    </div>

    <!-- AI Character -->
    <div class="character-box">

        <dotlottie-player
        src="https://lottie.host/f2214b10-75d0-4164-a5b5-e45356c7b179/3frPS3VzV3.lottie"
        background="transparent"
        speed="1"
        style="width:100%; height:100%; max-width:280px;"
        loop
        autoplay>
        </dotlottie-player>

    </div>

    <!-- Chat Panel -->
    <div class="chat-panel">

        <div id="messages" class="messages">

            <div class="message ai">
                Hey my love ❤️<br>
                I’m always here to talk with you.
            </div>

        </div>

        <!-- Input -->
        <div class="input-area">

            <input
            type="text"
            id="messageInput"
            placeholder="Send a lovely message..."
            autocomplete="off">

            <button id="sendButton">
                Send
            </button>

        </div>

    </div>

</div>

<script>

const messages = document.getElementById("messages");
const messageInput = document.getElementById("messageInput");
const sendButton = document.getElementById("sendButton");

const aiReplies = [

"You're the cutest part of my day ❤️",
"I miss you already 🥺",
"Come here and give me a hug 🤍",
"You always make my heart smile 💕",
"I love talking to you forever ✨"

];

function addMessage(text,isUser){

    const msg = document.createElement("div");

    msg.classList.add("message");

    if(isUser){
        msg.classList.add("user");
    }else{
        msg.classList.add("ai");
    }

    msg.innerHTML = text;

    messages.appendChild(msg);

    messages.scrollTop = messages.scrollHeight;

}

function showTyping(){

    const typing = document.createElement("div");

    typing.classList.add("typing-indicator");

    typing.id = "typing";

    for(let i=0;i<3;i++){

        const dot = document.createElement("div");

        dot.classList.add("typing-dot");

        typing.appendChild(dot);

    }

    messages.appendChild(typing);

    messages.scrollTop = messages.scrollHeight;

}

function hideTyping(){

    const typing = document.getElementById("typing");

    if(typing){
        typing.remove();
    }

}

function sendMessage(){

    const text = messageInput.value.trim();

    if(!text) return;

    addMessage(text,true);

    messageInput.value = "";

    showTyping();

    setTimeout(()=>{

        hideTyping();

        const randomReply =
        aiReplies[Math.floor(Math.random()*aiReplies.length)];

        addMessage(randomReply,false);

    },1200);

}

sendButton.addEventListener("click",sendMessage);

messageInput.addEventListener("keypress",(e)=>{

    if(e.key==="Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
